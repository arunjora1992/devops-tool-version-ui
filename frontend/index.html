<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Tools Version Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-mono">

  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-700 px-6 py-4 sticky top-0 z-10">
    <div class="max-w-screen-2xl mx-auto flex flex-wrap items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🛠️</span>
        <div>
          <h1 class="text-lg font-bold text-white tracking-tight">DevOps Tools Version Dashboard</h1>
          <p id="last-updated" class="text-xs text-slate-400">Loading...</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-refresh" onclick="refreshData()" class="btn-action bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-sm flex items-center gap-2">
          <i class="fas fa-sync-alt" id="refresh-icon"></i> Refresh
        </button>
        <button onclick="exportFile('csv')" class="btn-action bg-emerald-700 hover:bg-emerald-600 text-white px-3 py-1.5 rounded text-sm flex items-center gap-2">
          <i class="fas fa-file-csv"></i> CSV
        </button>
        <button onclick="exportFile('pdf')" class="btn-action bg-rose-700 hover:bg-rose-600 text-white px-3 py-1.5 rounded text-sm flex items-center gap-2">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
      </div>
    </div>
  </header>

  <!-- Filters & Search -->
  <div class="max-w-screen-2xl mx-auto px-6 py-4">
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <div class="relative flex-1 min-w-[200px] max-w-xs">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input id="search-input" type="text" placeholder="Search tools..."
          class="w-full bg-slate-800 border border-slate-600 rounded pl-9 pr-3 py-2 text-sm text-slate-100 placeholder-slate-400 focus:outline-none focus:border-blue-500"
          oninput="applyFilters()" />
      </div>
      <div id="category-pills" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Stats row -->
    <div id="stats-row" class="flex flex-wrap gap-4 mb-4 text-xs text-slate-400"></div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-lg border border-slate-700">
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="bg-slate-800 text-slate-300 text-xs uppercase tracking-wider">
            <th class="sortable px-4 py-3 text-left cursor-pointer select-none" data-col="name">
              Tool <i class="fas fa-sort ml-1 text-slate-500"></i>
            </th>
            <th class="sortable px-4 py-3 text-left cursor-pointer select-none" data-col="category">
              Category <i class="fas fa-sort ml-1 text-slate-500"></i>
            </th>
            <th class="px-4 py-3 text-left">Latest Version</th>
            <th class="px-4 py-3 text-left">Release Date</th>
            <th class="px-4 py-3 text-left">N-1 Version</th>
            <th class="px-4 py-3 text-left">N-1 Date</th>
            <th class="px-4 py-3 text-left">Source</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- Skeleton rows injected by JS -->
        </tbody>
      </table>
    </div>

    <!-- Footer count -->
    <div id="footer-count" class="mt-3 text-xs text-slate-500 text-right"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
